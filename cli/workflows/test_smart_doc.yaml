workflow: "Smart Document Processing"
steps:
  - run: EchoPlugin
    input: "document.pdf"
  - run: EchoPlugin
    input_from: step1
    condition:
      condition_type: OutputContains
      field: "step1"
      operator: Contains
      value: "pdf"
  - run: EchoPlugin
    input_from: step1
    condition:
      condition_type: OutputContains
      field: "step1"
      operator: Contains
      value: "image"
  - run: EchoPlugin
    input_from: step1
    condition:
      condition_type: OutputContains
      field: "step1"
      operator: Contains
      value: "text"
  - run: SummarizerPlugin
    depends_on: ["step2", "step3", "step4"]