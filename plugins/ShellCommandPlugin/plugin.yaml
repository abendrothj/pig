name: ShellCommandPlugin
version: 0.1.0
description: Runs a trusted shell command and returns its stdout (gated by LAO_ALLOW_SHELL=1)
maintainer: LAO Contributors
tags: [shell, command, exec, utility]
input:
  type: any
output:
  type: text
example_prompts:
  - "Run `git status --short` in this repo"
  - "List the running containers with docker ps"
