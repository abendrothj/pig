name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build CLI (release)
        run: cargo build --release --bin lao-cli

      - name: Package artifacts
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGING="lao-${VERSION}-${{ matrix.target }}"
          mkdir -p "${STAGING}/bin"
          cp target/release/lao-cli "${STAGING}/bin/"
          cp README.md lao.toml.example "${STAGING}/"
          tar czf "lao-${VERSION}-${{ matrix.target }}.tar.gz" "${STAGING}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: lao-*-${{ matrix.target }}.*
