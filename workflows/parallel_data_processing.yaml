workflow: "Parallel Data Processing"
description: "Process multiple data sources in parallel, then merge results"
steps:
  # Level 0: Three independent data sources (run in parallel)
  - run: EchoPlugin
    input: "Processing customer data from database"
    cache_key: "customer_data"
  
  - run: EchoPlugin
    input: "Processing product catalog from API"
    cache_key: "product_catalog"
  
  - run: EchoPlugin
    input: "Processing order history from file"
    cache_key: "order_history"

  # Level 1: Merge step waits for all three, uses customer data as primary input
  - run: EchoPlugin
    input_from: step1
    depends_on: ["step2", "step3"]
    cache_key: "merged_data"
    description: "Merge all data sources for analysis"

  # Level 2: Process merged data
  - run: EchoPlugin
    input_from: step4
    cache_key: "final_analysis"
