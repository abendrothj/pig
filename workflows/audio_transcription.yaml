workflow: "Audio Transcription & Summary"
description: "Transcribe audio and create a summary"
steps:
  # Step 1: Transcribe audio file
  - run: WhisperPlugin
    input: "meeting_recording.wav"
    cache_key: "whisper_transcription"
    retries: 2
    retry_delay: 1000
  
  # Step 2: Summarize the transcription
  - run: SummarizerPlugin
    input_from: step1
    cache_key: "summary"
    description: "Create a concise summary of the meeting"
