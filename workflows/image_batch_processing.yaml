# Batch Image Processing with Loops
# Process multiple images in parallel with modality detection

workflow: "batch_image_processing"
description: "Process multiple images: resize, OCR, classification, generate captions"

steps:
  # Step 1: Loop through all images in directory
  - id: process_images
    run: MultimodalPlugin
    input:
      task: "analyze"
      for_each:
        items:
          - "photo1.jpg"
          - "photo2.png"
          - "photo3.gif"
          - "screenshot.png"
          - "diagram.jpg"
        var: "image_file"
        collect_results: true
        max_parallel: 3  # Process 3 images concurrently
      file: "${image_file}"
    input_modality: Image
    output_modality: Structured
    retries: 2
    retry_delay: 1000
    
  # Step 2: Generate captions for all images
  - id: generate_captions
    run: OllamaPlugin
    input:
      prompt: "Generate a descriptive caption for this image"
      image_analysis: "$process_images.output"
    depends_on:
      - process_images
    input_modality: Structured
    output_modality: Text
    
  # Step 3: Create summary report
  - id: create_report
    run: SummarizerPlugin
    input:
      captions: "$generate_captions.output"
      format: "markdown"
      title: "Image Batch Processing Report"
    depends_on:
      - generate_captions
    input_modality: Text
    output_modality: Text
