# Mixed Media Processing - Images, Audio, Video, Text
# Process multiple media types in one workflow with automatic modality detection

workflow: "mixed_media_analysis"
description: "Process mixed media: images, audio, video, text documents"

steps:
  # Step 1: Process all media files with automatic modality detection
  - id: detect_and_process
    run: MultimodalPlugin
    input:
      for_each:
        items:
          - "presentation.pdf"      # Binary → Structured
          - "screenshot.png"        # Image → Structured
          - "recording.mp3"         # Audio → Text
          - "demo_video.mp4"        # Video → Image
          - "notes.txt"             # Text → Text
        var: "media_file"
        collect_results: true
        max_parallel: 2
      file: "${media_file}"
      auto_detect: true
    # No input_modality = auto-detect from file extension
    output_modality: Structured
    retries: 3
    retry_delay: 2000
    
  # Step 2: Extract text from all processed media
  - id: extract_text
    run: MultimodalPlugin
    input:
      task: "to_text"
      media_data: "$detect_and_process.output"
    depends_on:
      - detect_and_process
    input_modality: Structured
    output_modality: Text
    
  # Step 3: Analyze content across all media types
  - id: cross_media_analysis
    run: OllamaPlugin
    input:
      prompt: "Analyze the content across all these media files and identify common themes"
      text_data: "$extract_text.output"
    depends_on:
      - extract_text
    input_modality: Text
    output_modality: Text
    
  # Step 4: Generate comprehensive report
  - id: generate_report
    run: SummarizerPlugin
    input:
      analysis: "$cross_media_analysis.output"
      format: "detailed_markdown"
      sections:
        - "Media Overview"
        - "Common Themes"
        - "Key Findings"
        - "Recommendations"
    depends_on:
      - cross_media_analysis
    input_modality: Text
    output_modality: Text
