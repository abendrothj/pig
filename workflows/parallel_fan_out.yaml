workflow: "Fan-Out Parallel Pattern"
description: "Single step spawns multiple parallel processing branches"
steps:
  # Level 0: Initial processing
  - run: EchoPlugin
    input: "Process input data"
    cache_key: "initial_process"

  # Level 1: Three parallel branches spawned from step1
  - run: EchoPlugin
    input_from: step1
    cache_key: "branch_a_analysis"
  
  - run: EchoPlugin
    input_from: step1
    cache_key: "branch_b_analysis"
  
  - run: EchoPlugin
    input_from: step1
    cache_key: "branch_c_analysis"

  # Level 2: Final aggregation (waits for all branches)
  - run: EchoPlugin
    input_from: step2
    depends_on: ["step3", "step4"]
    cache_key: "final_aggregation"
