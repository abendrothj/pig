workflow: "Audio Transcription and Summary"
description: "Transcribe audio file and create a summary"
steps:
  - run: WhisperPlugin
    input: "audio.wav"
    cache_key: "whisper_audio"
    description: "Transcribe the audio file to text"
  
  - run: SummarizerPlugin
    input_from: step1
    cache_key: "summary_audio"
    description: "Summarize the transcribed text"