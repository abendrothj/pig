# Video Frame Extraction and Analysis
# Extract frames from video, analyze each frame, generate timeline

workflow: "video_frame_analysis"
description: "Extract frames from video and analyze each frame for objects/text/scenes"

steps:
  # Step 1: Extract frames from video
  - id: extract_frames
    run: MultimodalPlugin
    input:
      file: "input_video.mp4"
      task: "extract_frames"
      fps: 1  # Extract 1 frame per second
    input_modality: Video
    output_modality: Image
    
  # Step 2: Analyze each extracted frame
  - id: analyze_frames
    run: MultimodalPlugin
    input:
      task: "detect_objects"
      for_each:
        items: "${extract_frames.frames}"
        var: "frame"
        collect_results: true
        max_parallel: 4
      file: "${frame}"
    depends_on:
      - extract_frames
    input_modality: Image
    output_modality: Structured
    
  # Step 3: Generate scene descriptions
  - id: describe_scenes
    run: OllamaPlugin
    input:
      prompt: "Describe what's happening in these video frames"
      frame_analysis: "$analyze_frames.output"
    depends_on:
      - analyze_frames
    input_modality: Structured
    output_modality: Text
    
  # Step 4: Create video summary
  - id: video_summary
    run: SummarizerPlugin
    input:
      scenes: "$describe_scenes.output"
      format: "timeline"
    depends_on:
      - describe_scenes
    input_modality: Text
    output_modality: Text
