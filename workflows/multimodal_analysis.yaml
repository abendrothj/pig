workflow: multimodal_combined_analysis
description: "Demonstrates multimodal workflow with audio transcription, summarization, and insight extraction"

steps:
  - run: WhisperPlugin
    params:
      model: "base"
      language: "auto"
    cache_key: "whisper_transcription"

  - run: SummarizerPlugin
    input_from: step1
    params:
      max_length: 200
      style: "bullet_points"
    depends_on:
      - step1

  - run: PromptDispatcherPlugin
    input_from: step2
    params:
      prompt: "Extract action items, key topics, and sentiment. Return as JSON."
      temperature: 0.3
    depends_on:
      - step2

  - run: EchoPlugin
    input_from: step3
    params:
      format: "formatted"
    depends_on:
      - step3
