workflow: multimodal_audio_analysis
steps:
  - run: WhisperPlugin
    params:
      audio_file: "input_audio.mp3"
      language: "en"
    cache_key: "transcription"

  - run: SummarizerPlugin
    input_from: step1
    params:
      max_length: 150
    depends_on:
      - step1

  - run: PromptDispatcherPlugin
    input_from: step2
    params:
      prompt: "Extract key topics and sentiment from this transcription"
    depends_on:
      - step2
