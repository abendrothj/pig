workflow: "Local LLM Example"
schema_version: 2
steps:
  - id: locate_execution
    run: EchoPlugin
    input: "trace: execute -> validate -> commit"
  - id: reason
    run: local_llm
    input_from:
      step: locate_execution
      output: output
    with:
      role: reasoning
      system: "Be terse."
      prompt: |
        Analyze the supplied execution path.
        Identify likely failure boundaries and retry hazards.
      generation:
        max_tokens: 256
        temperature: 0.2
      requirements:
        minimum_context_tokens: 4096
        allow_cpu_fallback: true
