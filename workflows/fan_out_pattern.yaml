workflow: "Fan-Out Processing Pattern"
description: "Single data source spawns multiple parallel analysis branches"
steps:
  # Step 1: Initial data processing
  - run: EchoPlugin
    input: "Process input dataset"
    cache_key: "initial_data"
  
  # Level 1: Three parallel analysis branches (all use step1 output)
  - run: EchoPlugin
    input_from: step1
    cache_key: "analysis_branch_a"
    description: "Statistical analysis"
  
  - run: EchoPlugin
    input_from: step1
    cache_key: "analysis_branch_b"
    description: "Trend analysis"
  
  - run: EchoPlugin
    input_from: step1
    cache_key: "analysis_branch_c"
    description: "Pattern detection"
  
  # Level 2: Aggregate all branch results
  - run: EchoPlugin
    input_from: step2
    depends_on: ["step3", "step4"]
    cache_key: "aggregated_results"
    description: "Combine all analysis results"
