# Image Analysis Workflow
# Processes images with OCR, object detection, and description generation

workflow: "image_analysis"
description: "Analyze images: OCR text extraction, object detection, generate descriptions"

steps:
  # Step 1: Extract text from image (OCR)
  - id: ocr_extraction
    run: MultimodalPlugin
    input:
      file: "input_image.png"
      task: "ocr"
    input_modality: Image
    output_modality: Text
    
  # Step 2: Detect objects in image
  - id: object_detection
    run: MultimodalPlugin
    input:
      file: "input_image.png"
      task: "detect_objects"
    input_modality: Image
    output_modality: Structured
    
  # Step 3: Generate image description
  - id: describe_image
    run: OllamaPlugin
    input:
      prompt: "Describe this image in detail"
      image_data: "$ocr_extraction.output"
      objects: "$object_detection.output"
    depends_on:
      - ocr_extraction
      - object_detection
    input_modality: Structured
    output_modality: Text
    
  # Step 4: Summarize findings
  - id: summary
    run: SummarizerPlugin
    input:
      text: "$describe_image.output"
      max_length: 200
    depends_on:
      - describe_image
    input_modality: Text
    output_modality: Text
