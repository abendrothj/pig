workflow: "Multi-Modal Processing"
description: "Process audio and text inputs, then combine results"
steps:
  # Step 1: Transcribe audio
  - run: WhisperPlugin
    input: "presentation_audio.wav"
    cache_key: "audio_transcription"
  
  # Step 2: Process text document (runs in parallel with step 1)
  - run: EchoPlugin
    input: "presentation_slides.txt"
    cache_key: "text_processing"
  
  # Step 3: Summarize audio transcription
  - run: SummarizerPlugin
    input_from: step1
    cache_key: "audio_summary"
    description: "Summarize the transcribed audio"
  
  # Step 4: Combine results (waits for both audio summary and text processing)
  - run: EchoPlugin
    input_from: step3
    depends_on: ["step2"]
    cache_key: "combined_results"
    description: "Combine audio summary with processed text"
